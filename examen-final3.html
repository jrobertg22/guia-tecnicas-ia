<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Nivel Maestría V2: Técnicas Avanzadas de IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; 
            --card-bg: #ffffff;
            --primary: #f7b212;
            --text-main: #1e293b;
            --text-light: #64748b;
            --accent: #3b82f6;
            --success: #15803d;
            --error: #b91c1c;
            --feedback-bg: #f8fafc;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 95%;
            max-width: 850px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            padding: 40px;
            position: relative;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--primary));
            width: 0%;
            transition: width 0.4s ease;
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { font-family: 'Arvo', serif; font-size: 1.8rem; margin: 0; color: #0f172a; }
        .question-info { font-weight: 600; color: var(--accent); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1.5px; margin-bottom: 10px; display: block; }

        .question-text { font-size: 1.25rem; line-height: 1.6; margin-bottom: 25px; font-weight: 600; color: #1e293b; }
        .options-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 12px; }
        .option-item { border: 2px solid #f1f5f9; border-radius: 12px; padding: 16px 20px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; font-size: 1rem; background: #fff; }
        .option-item:hover:not(.disabled) { border-color: var(--accent); background-color: #f0f9ff; }
        .option-item.selected { border-color: var(--primary); background-color: #fffbeb; }
        .option-item.correct-ans { border-color: var(--success); background-color: #f0fdf4; color: var(--success); font-weight: 600; }
        .option-item.wrong-ans { border-color: var(--error); background-color: #fef2f2; color: var(--error); }
        .option-item.disabled { cursor: default; }

        .feedback-area { margin-top: 25px; padding: 20px; border-radius: 12px; background: var(--feedback-bg); border-left: 5px solid var(--accent); display: none; }
        .feedback-title { font-weight: 700; display: block; margin-bottom: 8px; font-size: 1.1rem; }
        .justification { font-size: 0.95rem; line-height: 1.5; color: var(--text-light); }

        .nav-buttons { margin-top: 35px; display: flex; justify-content: space-between; gap: 15px; }
        button { padding: 14px 28px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 0.95rem; }
        .btn-validate { background: var(--primary); color: #000; flex-grow: 1; }
        .btn-next { background: var(--bg-color); color: white; }
        .btn-prev { background: #f1f5f9; color: var(--text-light); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        #result-screen { text-align: center; display: none; }
        .score-circle { width: 160px; height: 160px; border-radius: 50%; border: 10px solid var(--primary); display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 30px auto; background: #fff; }
        .grade-val { font-size: 2.8rem; font-weight: 800; color: #0f172a; }
        .grade-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-light); letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="progress-bar-container"><div id="progress-fill"></div></div>
    
    <div id="quiz-screen">
        <header>
            <span class="question-info" id="q-meta"></span>
            <h1>Maestría en Inteligencia Artificial</h1>
        </header>
        <div id="q-text" class="question-text"></div>
        <div class="options-list" id="options-container"></div>
        <div class="feedback-area" id="feedback-area">
            <span class="feedback-title" id="feedback-status"></span>
            <p id="justification-text" class="justification"></p>
        </div>
        <div class="nav-buttons">
            <button class="btn-prev" id="btn-prev" onclick="changeQuestion(-1)">Anterior</button>
            <button class="btn-validate" id="btn-validate" onclick="validateCurrent()">Enviar Respuesta</button>
            <button class="btn-next" id="btn-next" onclick="changeQuestion(1)" disabled>Siguiente</button>
        </div>
    </div>

    <div id="result-screen">
        <h1>Resultado de la Evaluación</h1>
        <div class="score-circle">
            <div class="grade-val" id="final-grade">0.00</div>
            <div class="grade-label">Puntaje</div>
        </div>
        <div id="status-badge" style="font-size: 1.5rem; font-weight: 700; margin-top: 15px;"></div>
        <p id="evaluation-text" style="color: var(--text-light); margin-top: 20px;"></p>
        <div style="text-align: left; background: #f8fafc; padding: 25px; border-radius: 16px; margin-top: 30px; border: 1px solid #e2e8f0;">
            <h3 style="margin-top: 0;">Áreas a Reforzar:</h3>
            <ul id="failed-topics" style="line-height: 1.8; color: #475569;"></ul>
        </div>
        <button class="btn-next" style="margin-top: 30px; width: 100%;" onclick="location.reload()">Nuevo Intento</button>
        <button class="btn-prev" style="margin-top: 12px; width: 100%;" onclick="window.location.href='index.html'">Volver al Portal</button>
    </div>
</div>

<script>
    const masteryBank = {
        T1: [
            { q: "En el contexto de la IA Simbólica frente a la Conexionista, ¿qué ventaja fundamental ofrece el enfoque simbólico en entornos industriales regulados?", opts: ["Mayor capacidad de generalización", "Explicabilidad y trazabilidad del razonamiento (White Box)", "Eficiencia en el procesamiento de señales ruidosas", "Auto-aprendizaje sin intervención humana"], correct: 1, just: "La IA simbólica permite auditar cada paso lógico, crucial en sectores regulados." },
            { q: "Durante la fase de 'Transformación' de KDD, ¿por qué es crítico realizar un análisis de varianza antes de reducir dimensiones?", opts: ["Para eliminar el ruido aleatorio", "Para asegurar que no se pierde información discriminante esencial", "Para normalizar los datos", "Para validar la interpretación"], correct: 1, just: "La reducción de dimensiones debe preservar la varianza que explica las diferencias entre clases." },
            { q: "Desde una perspectiva ética de maestría, ¿qué riesgo introduce la 'IA Débil' en sistemas automatizados?", opts: ["Conciencia de clase", "Sesgo algorítmico derivado de datos históricos", "Incansabilidad", "Falta de potencia"], correct: 1, just: "Replican sesgos presentes en los datos de entrenamiento sin criterio moral." }
        ],
        T2: [
            { q: "¿Qué mecanismo permite que NumPy supere las limitaciones del Global Interpreter Lock (GIL)?", opts: ["Decoradores @jit", "Ejecución en extensiones de C/C++ fuera del stack de Python", "Multithreading de listas", "Variables inmutables"], correct: 1, just: "NumPy libera el GIL al ejecutar cómputos intensivos en código de bajo nivel." },
            { q: "Al gestionar grandes DataFrames, ¿qué estrategia minimiza el uso de RAM?", opts: ["Columnas tipo 'object'", "Copias profundas", "Downcasting numérico y uso de categorías", "Archivos .txt"], correct: 2, just: "Optimizar dtypes reduce el footprint de memoria significativamente." },
            { q: "¿Cuándo es preferible usar TensorFlow Lite?", opts: ["Petabytes de datos", "Inferencia en dispositivos 'Edge' con latencia baja", "Visualización", "Investigación teórica"], correct: 1, just: "TF Lite optimiza grafos para hardware limitado y local." }
        ],
        T3: [
            { q: "¿Por qué C4.5 prefiere la 'Proporción de Ganancia' sobre la pura?", opts: ["Es menos costosa", "Corrige el sesgo hacia atributos con muchos niveles", "Árbol binario", "Aumenta la entropía"], correct: 1, just: "La ganancia pura favorece atributos con alta cardinalidad (ej. IDs)." },
            { q: "En Random Forest, ¿qué pasa al aumentar n_estimators indefinidamente?", opts: ["Overfitting extremo", "Se estabiliza el error pero aumenta el coste computacional", "Modelo lineal", "Desaparece la varianza"], correct: 1, just: "Aumentar árboles no causa overfitting pero consume más recursos." },
            { q: "La 'Pospoda' se considera superior a la 'Prepoda' porque:", opts: ["Más rápida", "Evita el problema de 'visión de túnel'", "Menos datos", "Usa Gini"], correct: 1, just: "Evalúa el impacto real después de que se ha desarrollado el contexto completo." }
        ],
        T4: [
            { q: "En asociación, ¿qué indica un valor de 'Lift' igual a 1.0?", opts: ["Correlación perfecta", "Independencia estadística absoluta", "A causa a B", "Invalidez"], correct: 1, just: "Si Lift=1, la ocurrencia de A no altera la probabilidad de B." },
            { q: "¿Qué ventaja tiene PRISM frente al mapeo de árboles a reglas?", opts: ["Reglas no mutuamente excluyentes", "Menos reglas", "Sin soporte", "Datos binarios"], correct: 0, just: "Genera reglas modulares que pueden solaparse." },
            { q: "El 'Recubrimiento Secuencial' es 'Greedy'. ¿Qué implicación tiene?", opts: ["Garantiza camino corto", "Puede estancarse en óptimos locales", "Exhaustiva", "Sin confianza"], correct: 1, just: "Al elegir el mejor paso inmediato, puede perder mejores combinaciones globales." }
        ],
        T5: [
            { q: "¿Cuál es el propósito de una activación no lineal (ReLU) en ocultas?", opts: ["Multiplicar matrices", "Permitir aproximar funciones complejas", "Pesos positivos", "Normalizar"], correct: 1, just: "Sin no-linealidad, la red colapsaría en una transformación lineal simple." },
            { q: "El 'Desvanecimiento del Gradiente' afecta principalmente a:", opts: ["ReLU", "Sigmoides o Tangente Hiperbólica", "Identidad", "Leaky ReLU"], correct: 1, just: "Las derivadas son muy pequeñas en los extremos, impidiendo el flujo del error." },
            { q: "En redes de Hopfield, ¿qué representa la 'Función de Energía'?", opts: ["Velocidad", "Estabilidad al recuperar memorias", "Número de neuronas", "Cómputo"], correct: 1, just: "La red evoluciona hacia estados de mínima energía (atractores)." }
        ],
        T6: [
            { q: "En una CNN, ¿cómo influye el 'Stride' mayor a 1?", opts: ["Más resolución", "Reduce el tamaño (submuestreo)", "Más parámetros", "Sin efecto"], correct: 1, just: "Un stride mayor salta píxeles, reduciendo el mapa de características." },
            { q: "¿Qué diferencia al 'Double Q-Learning' del estándar?", opts: ["Doble memoria", "Desacopla selección de acción de evaluación", "Sin recompensas", "Espacios continuos"], correct: 1, just: "Evita el sesgo de sobreestimación del valor de la acción." },
            { q: "¿Cuál es la función del 'Discriminador' en una GAN?", opts: ["Generar imágenes", "Clasificador binario (real vs sintético)", "Reducir ruido", "Optimizar pérdida"], correct: 1, just: "Obliga al generador a mejorar mediante competencia." }
        ],
        T7: [
            { q: "Al evaluar K-means, ¿por qué la 'Inercia' no basta?", opts: ["Favorece K alto", "Sin distancia", "Datos convexos", "Lenta"], correct: 0, just: "La inercia baja siempre que K sube; se requiere método del codo o silueta." },
            { q: "¿Qué ventaja ofrece el algoritmo EM sobre K-means?", opts: ["Velocidad", "Permite clústeres con solapamientos (soft clustering)", "Óptimo global", "Sin inicialización"], correct: 1, just: "Usa mezclas gaussianas para capturar incertidumbre de pertenencia." },
            { q: "En jerárquico, el 'Enlace Completo' tiende a:", opts: ["Clústeres finos", "Clústeres compactos", "Clúster gigante", "Dos clústeres"], correct: 1, just: "Al medir la distancia máxima, evita el efecto de encadenamiento." }
        ],
        T8: [
            { q: "¿Cómo aborda la 'Factorización de Matrices' la dispersión?", opts: ["Quita usuarios", "Proyecta en factores latentes", "Más columnas", "Demográfico"], correct: 1, just: "Captura patrones ocultos para predecir celdas vacías." },
            { q: "En contenido, ¿qué riesgo tiene usar BoW puro?", opts: ["Pierde contexto semántico", "Latencia", "Colaborativo", "Muchos usuarios"], correct: 0, just: "BoW solo cuenta frecuencias, no distingue importancia relativa." },
            { q: "Un sistema Híbrido 'Paralelo' combina resultados mediante:", opts: ["Cascada", "Ponderación de múltiples modelos", "El mejor", "Clustering"], correct: 1, just: "Ejecuta varios modelos a la vez y agrega sus predicciones." }
        ],
        T9: [
            { q: "En A*, ¿qué sucede si h(n) es 'consistente'?", opts: ["Ciega", "Garantiza optimalidad sin re-explorar cerrados", "Coste cero", "Amplitud"], correct: 1, just: "La consistencia optimiza la eficiencia asegurando caminos mínimos locales." },
            { q: "¿Cuál es la complejidad espacial de IDS comparada con BFS?", opts: ["IDS más memoria", "IDS lineal O(bd) vs BFS exponencial O(b^d)", "Iguales", "IDS sin memoria"], correct: 1, just: "IDS combina eficiencia de memoria de DFS con completitud de BFS." },
            { q: "En suma cero, ¿cómo mejora la 'Poda Alfa-Beta'?", opts: ["Aumenta profundidad alcanzable", "Cambia decisión", "Múltiples rivales", "Sin evaluación"], correct: 0, just: "Al podar ramas irrelevantes, explora mucho más profundo." }
        ],
        T10: [
            { q: "¿Cómo gestiona Bayes la 'Probabilidad a Priori'?", opts: ["La ignora", "Punto de partida que se actualiza", "Suma al final", "Igual a 0.5"], correct: 1, just: "Es fundamental para ponderar la probabilidad final con evidencia." },
            { q: "En lógica difusa, ¿qué es un 'Término Lingüístico'?", opts: ["String", "Conjunto difuso que representa valor vago", "Error", "Modificador"], correct: 1, just: "Etiquetas como 'tibio' que dividen el universo de discurso." },
            { q: "Los 'Factores de Certeza' (CF) se diseñaron para:", opts: ["Decimales", "Evitar cantidades inmanejables de probabilidades", "Velocidad", "Reglas SI-ENTONCES"], correct: 1, just: "Permiten asignar confianza heurística sin datos estadísticos masivos." }
        ]
    };

    let quizData = [];
    let currentIdx = 0;
    let userAnswers = [];
    let validatedArr = [];

    function shuffleOptions(qObj, temaKey) {
        let options = qObj.opts.map((text, index) => ({ text, isCorrect: index === qObj.correct }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: qObj.q,
            opts: options.map(o => o.text),
            correct: options.findIndex(o => o.isCorrect),
            just: qObj.just,
            topic: temaKey.replace('T', 'Tema ')
        };
    }

    function initExam() {
        quizData = [];
        // SELECCIONA 2 PREGUNTAS POR TEMA (20 TOTAL)
        Object.keys(masteryBank).forEach(tema => {
            let pool = [...masteryBank[tema]];
            for(let i=0; i<2; i++) {
                if(pool.length === 0) break;
                let rand = Math.floor(Math.random() * pool.length);
                let rawQ = pool.splice(rand, 1)[0];
                quizData.push(shuffleOptions(rawQ, tema));
            }
        });
        quizData.sort(() => Math.random() - 0.5);
        userAnswers = new Array(quizData.length).fill(null);
        validatedArr = new Array(quizData.length).fill(false);
        render();
    }

    function render() {
        const q = quizData[currentIdx];
        const isValidated = validatedArr[currentIdx];
        document.getElementById('q-meta').innerText = `DESAFÍO ${currentIdx + 1} DE 20 | ${q.topic}`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / 20) * 100}%`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        q.opts.forEach((opt, i) => {
            const div = document.createElement('div');
            const isSelected = userAnswers[currentIdx] === i;
            let statusClass = "";
            if (isValidated) {
                if (i === q.correct) statusClass = "correct-ans";
                else if (isSelected) statusClass = "wrong-ans";
                div.classList.add("disabled");
            } else if (isSelected) statusClass = "selected";

            div.className = `option-item ${statusClass}`;
            div.innerHTML = `<span>${opt}</span>`;
            if (!isValidated) div.onclick = () => selectOption(i);
            container.appendChild(div);
        });

        document.getElementById('feedback-area').style.display = isValidated ? "block" : "none";
        if (isValidated) {
            const correct = userAnswers[currentIdx] === q.correct;
            document.getElementById('feedback-status').innerText = correct ? "ANÁLISIS CORRECTO" : "ERROR DE CONCEPTO";
            document.getElementById('feedback-status').style.color = correct ? "var(--success)" : "var(--error)";
            document.getElementById('justification-text').innerText = q.just;
        }

        document.getElementById('btn-prev').disabled = currentIdx === 0;
        document.getElementById('btn-validate').style.display = isValidated ? "none" : "block";
        document.getElementById('btn-next').disabled = !isValidated;
        document.getElementById('btn-next').innerText = currentIdx === 19 ? "RESULTADOS" : "SIGUIENTE";
    }

    function selectOption(idx) {
        userAnswers[currentIdx] = idx;
        render();
    }

    function validateCurrent() {
        if (userAnswers[currentIdx] === null) return alert("Selecciona una respuesta.");
        validatedArr[currentIdx] = true;
        render();
    }

    function changeQuestion(step) {
        if (step === 1 && currentIdx === 19) return showResults();
        currentIdx += step;
        render();
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        let correctCount = 0;
        const failedTopics = new Set();
        quizData.forEach((q, i) => {
            if (userAnswers[i] === q.correct) correctCount++;
            else failedTopics.add(q.topic);
        });

        const grade = (correctCount / 20) * 10;
        const finalGradeStr = grade.toFixed(2);
        const isApproved = grade >= 6.0;

        document.getElementById('final-grade').innerText = finalGradeStr;
        const statusBadge = document.getElementById('status-badge');
        statusBadge.innerText = isApproved ? "ESTADO: MAESTRÍA ALCANZADA" : "ESTADO: NO ACREDITADO";
        statusBadge.style.color = isApproved ? "var(--success)" : "var(--error)";

        const list = document.getElementById('failed-topics');
        list.innerHTML = "";
        failedTopics.forEach(t => { const li = document.createElement('li'); li.innerText = t; list.appendChild(li); });
        
        document.getElementById('evaluation-text').innerText = isApproved ? 
            `Has superado la evaluación con un ${finalGradeStr}.` : 
            `Nota obtenida: ${finalGradeStr}. Se requiere profundizar en la teoría.`;
    }

    initExam();
</script>
</body>
</html>
