<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Nivel Maestría: Técnicas Avanzadas de IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e293b; 
            --card-bg: #f8fafc;
            --primary: #f7b212;
            --text-main: #1e293b;
            --text-light: #64748b;
            --accent: #3b82f6;
            --success: #15803d;
            --error: #b91c1c;
            --feedback-bg: #f1f5f9;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 95%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            padding: 40px;
            position: relative;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            position: absolute;
            top: 0;
            left: 0;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        header { text-align: center; margin-bottom: 25px; }
        h1 { font-family: 'Arvo', serif; font-size: 1.6rem; margin: 0; color: var(--bg-color); }
        .question-info { font-weight: 600; color: var(--accent); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 8px; display: block; }

        .question-text { font-size: 1.2rem; line-height: 1.5; margin-bottom: 20px; font-weight: 600; }
        .options-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 10px; }
        .option-item { border: 2px solid #e2e8f0; border-radius: 10px; padding: 12px 18px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; font-size: 0.95rem; }
        .option-item:hover:not(.disabled) { border-color: var(--accent); background-color: #eff6ff; }
        .option-item.selected { border-color: var(--primary); background-color: #fefce8; }
        .option-item.correct-ans { border-color: var(--success); background-color: #f0fdf4; color: var(--success); font-weight: 600; }
        .option-item.wrong-ans { border-color: var(--error); background-color: #fef2f2; color: var(--error); }
        .option-item.disabled { cursor: default; }

        .feedback-area { margin-top: 20px; padding: 15px; border-radius: 10px; background: var(--feedback-bg); border-left: 4px solid var(--accent); display: none; }
        .feedback-title { font-weight: 700; display: block; margin-bottom: 5px; }

        .nav-buttons { margin-top: 25px; display: flex; justify-content: space-between; gap: 10px; }
        button { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-validate { background: var(--primary); color: #000; flex-grow: 1; }
        .btn-next { background: var(--bg-color); color: white; }
        .btn-prev { background: #e2e8f0; color: var(--text-light); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        #result-screen { text-align: center; display: none; }
        .score-circle { width: 140px; height: 140px; border-radius: 50%; border: 8px solid var(--primary); display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 20px auto; }
        .grade-val { font-size: 2.2rem; font-weight: 800; line-height: 1; }
        .grade-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-light); margin-top: 5px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="progress-bar-container">
        <div id="progress-fill"></div>
    </div>
    
    <div id="quiz-screen">
        <header>
            <span class="question-info" id="q-meta"></span>
            <h1>Maestría en Inteligencia Artificial</h1>
        </header>
        <div id="q-text" class="question-text"></div>
        <div class="options-list" id="options-container"></div>
        <div class="feedback-area" id="feedback-area">
            <span class="feedback-title" id="feedback-status"></span>
            <p id="justification-text" class="justification"></p>
        </div>
        <div class="nav-buttons">
            <button class="btn-prev" id="btn-prev" onclick="changeQuestion(-1)">Anterior</button>
            <button class="btn-validate" id="btn-validate" onclick="validateCurrent()">Enviar Respuesta</button>
            <button class="btn-next" id="btn-next" onclick="changeQuestion(1)" disabled>Siguiente</button>
        </div>
    </div>

    <div id="result-screen">
        <h1>Resultado de la Evaluación</h1>
        <div class="score-circle">
            <div class="grade-val" id="final-grade">0.00</div>
            <div class="grade-label">Puntaje</div>
        </div>
        <div id="status-badge" style="font-size: 1.5rem; font-weight: 700; margin-top: 15px;"></div>
        <p id="evaluation-text" style="color: var(--text-light); margin-top: 20px;"></p>
        <div style="text-align: left; background: #f8fafc; padding: 25px; border-radius: 16px; margin-top: 30px; border: 1px solid #e2e8f0;">
            <h3 style="margin-top: 0;">Áreas a Reforzar:</h3>
            <ul id="failed-topics" style="line-height: 1.8; color: #475569;"></ul>
        </div>
        <button class="btn-next" style="margin-top: 30px; width: 100%;" onclick="location.reload()">Nuevo Intento</button>
        <button class="btn-prev" style="margin-top: 12px; width: 100%;" onclick="window.location.href='index.html'">Volver al Portal</button>
    </div>
</div>

<script>
    const masteryBank = {
        T1: [
            { q: "En el contexto de la IA Simbólica frente a la Conexionista, ¿qué ventaja fundamental ofrece el enfoque simbólico en entornos industriales regulados?", opts: ["Mayor capacidad de generalización", "Explicabilidad y trazabilidad del razonamiento (White Box)", "Eficiencia en el procesamiento de señales ruidosas", "Auto-aprendizaje sin intervención humana"], correct: 1, just: "La IA simbólica permite auditar cada paso lógico, crucial en sectores como el legal o médico." },
            { q: "Durante la fase de 'Transformación' de KDD, ¿por qué es crítico realizar un análisis de varianza antes de reducir dimensiones?", opts: ["Para eliminar el ruido aleatorio", "Para asegurar que no se pierde información discriminante esencial", "Para normalizar los datos en el rango [0,1]", "Para validar la interpretación del experto"], correct: 1, just: "La reducción de dimensiones debe preservar la varianza que explica las diferencias entre clases." },
            { q: "Desde una perspectiva ética de maestría, ¿qué riesgo introduce la 'IA Débil' en sistemas de selección automatizada?", opts: ["Conciencia de clase", "Sesgo algorítmico derivado de datos históricos", "Incansabilidad en el proceso", "Falta de potencia de cálculo"], correct: 1, just: "Al no tener 'conciencia', estos sistemas replican sesgos presentes en los datos de entrenamiento sin criterio moral." }
        ],
        T2: [
            { q: "¿Qué mecanismo de Python permite que la librería NumPy supere las limitaciones del Global Interpreter Lock (GIL)?", opts: ["El uso de decoradores @jit", "La ejecución de operaciones en extensiones de C/C++ fuera del stack de Python", "El multithreading nativo de las listas", "El uso exclusivo de variables inmutables"], correct: 1, just: "NumPy libera el GIL al ejecutar cómputos intensivos en código compilado de bajo nivel." },
            { q: "Al gestionar grandes DataFrames en Pandas, ¿qué estrategia minimiza drásticamente el uso de memoria RAM?", opts: ["Convertir todas las columnas a tipo 'object'", "Hacer copias profundas constantes", "Downcasting de tipos numéricos y uso de categorías", "Usar solo archivos .txt"], correct: 2, just: "Optimizar los dtypes reduce el footprint de memoria significativamente." },
            { q: "En un entorno de producción de IA, ¿cuándo es preferible usar TensorFlow Lite sobre TensorFlow estándar?", opts: ["Para entrenar modelos con Petabytes de datos", "Para inferencia en dispositivos 'Edge' con latencia ultra-baja", "Para visualización de gradientes", "Para investigación teórica"], correct: 1, just: "TF Lite optimiza los grafos para hardware limitado y local." }
        ],
        T3: [
            { q: "¿Por qué el algoritmo C4.5 prefiere la 'Proporción de Ganancia' sobre la 'Ganancia de Información' pura?", opts: ["Es menos costosa", "Corrige el sesgo hacia atributos con muchos niveles", "Garantiza que el árbol sea binario", "Aumenta la entropía de los nodos raíz"], correct: 1, just: "La ganancia pura favorece atributos con alta cardinalidad (como IDs), lo cual no generaliza bien." },
            { q: "En Random Forest, ¿cuál es el impacto técnico de aumentar el número de árboles (n_estimators) indefinidamente?", opts: ["El modelo sufrirá de Overfitting extremo", "Se estabiliza el error pero aumenta el coste computacional linealmente", "El modelo se vuelve lineal", "Desaparece la varianza"], correct: 1, just: "Random Forest no hace overfitting por añadir más árboles, pero consume más recursos." },
            { q: "La 'Pospoda' se considera superior a la 'Prepoda' porque:", opts: ["Es más rápida de ejecutar", "Evita el problema de 'visión de túnel'", "Requiere menos datos", "Utiliza el índice Gini"], correct: 1, just: "La pospoda evalúa el impacto real después de que se ha desarrollado el contexto completo." }
        ],
        T4: [
            { q: "En reglas de asociación, ¿qué indica un valor de 'Lift' igual a 1.0 entre dos ítems {A} y {B}?", opts: ["Correlación perfecta", "Independencia estadística absoluta", "A causa a B", "Regla es inválida"], correct: 1, just: "Si Lift=1, la ocurrencia de A no altera la probabilidad de B; son independientes." },
            { q: "¿Cuál es la ventaja de PRISM frente a los métodos que mapean árboles a reglas?", opts: ["Reglas no necesitan ser mutuamente excluyentes", "Genera menos reglas", "No requiere soporte", "Solo datos binarios"], correct: 0, just: "PRISM genera reglas modulares que pueden solaparse." },
            { q: "El algoritmo de 'Recubrimiento Secuencial' aplica una estrategia 'Greedy'. ¿Qué implicación tiene esto?", opts: ["Garantiza el camino más corto", "Puede estancarse en óptimos locales", "Búsqueda exhaustiva", "No usa confianza"], correct: 1, just: "Al elegir el mejor paso inmediato, puede perder mejores combinaciones globales." }
        ],
        T5: [
            { q: "¿Cuál es el propósito de aplicar una activación no lineal (como ReLU) en capas ocultas?", opts: ["Acelerar multiplicación", "Permitir aproximar funciones no lineales complejas", "Pesos positivos", "Normalizar salida"], correct: 1, just: "Sin no-linealidad, la red colapsaría en una simple transformación lineal." },
            { q: "El 'Desvanecimiento del Gradiente' afecta principalmente a activaciones:", opts: ["ReLU", "Sigmoides o Tangente Hiperbólica", "Identidad", "Leaky ReLU"], correct: 1, just: "Las derivadas son muy pequeñas en los extremos, impidiendo que el error fluya." },
            { q: "En redes de Hopfield, ¿qué representa la 'Función de Energía'?", opts: ["Velocidad de entrenamiento", "Estabilidad de la red al recuperar una memoria", "Número de neuronas", "Coste de computación"], correct: 1, just: "La red evoluciona hacia estados de mínima energía (atractores)." }
        ],
        T6: [
            { q: "En una CNN, ¿cómo influye el 'Stride' (paso) mayor a 1?", opts: ["Aumenta resolución", "Reduce el tamaño de salida (submuestreo)", "Aumenta parámetros", "Sin efecto"], correct: 1, just: "Un stride mayor salta píxeles, resultando en un mapa de características más pequeño." },
            { q: "En Aprendizaje por Refuerzo, ¿qué diferencia al 'Double Q-Learning' del estándar?", opts: ["Doble memoria", "Desacopla selección de acción de su evaluación", "Sin recompensas", "Espacios continuos"], correct: 1, just: "Usa dos redes para evitar el sesgo de sobreestimación del valor." },
            { q: "¿Cuál es la función del 'Discriminador' en una GAN?", opts: ["Generar imágenes", "Clasificador binario para distinguir real de sintético", "Reducir ruido", "Optimizar pérdida"], correct: 1, just: "Obliga al generador a mejorar su calidad mediante competencia." }
        ],
        T7: [
            { q: "Al evaluar K-means, ¿por qué la 'Inercia' no es suficiente por sí sola?", opts: ["Favorece siempre a los modelos con K más alto", "No mide distancia", "Solo datos convexos", "Es lenta"], correct: 0, just: "La inercia baja a medida que K sube; se requiere el método del codo o silueta." },
            { q: "¿Qué ventaja ofrece el algoritmo EM sobre K-means?", opts: ["Más rápido", "Permite clústeres con solapamientos (soft clustering)", "Óptimo global", "Sin inicialización"], correct: 1, just: "Captura la incertidumbre de pertenencia usando mezclas gaussianas." },
            { q: "En enlace jerárquico, el 'Enlace Completo' tiende a producir:", opts: ["Clústeres alargados", "Clústeres compactos", "Clúster gigante", "Solo dos clústeres"], correct: 1, just: "Al medir la distancia máxima, evita el efecto de 'encadenamiento'." }
        ],
        T8: [
            { q: "¿Cómo aborda la 'Factorización de Matrices' la dispersión (sparsity)?", opts: ["Eliminando usuarios", "Proyectando en un espacio de factores latentes", "Más columnas", "Solo demográfico"], correct: 1, just: "Captura patrones ocultos que permiten predecir votos en celdas vacías." },
            { q: "En recomendación por contenido, ¿cuál es el riesgo de usar BoW puro?", opts: ["Perder el contexto semántico", "Latencia", "Ser colaborativo", "Muchos usuarios"], correct: 0, just: "BoW solo cuenta frecuencias; no distingue relevancia semántica." },
            { q: "Un sistema Híbrido 'Paralelo' combina resultados mediante:", opts: ["Cascada", "Ponderación de múltiples algoritmos independientes", "Solo el mejor", "Clustering"], correct: 1, just: "Ejecuta varios modelos a la vez y agrega sus predicciones." }
        ],
        T9: [
            { q: "En A*, ¿qué sucede si h(n) es 'consistente'?", opts: ["Búsqueda ciega", "Garantiza optimalidad sin re-explorar nodos cerrados", "Coste cero", "En amplitud"], correct: 1, just: "La consistencia optimiza la eficiencia al asegurar caminos mínimos locales." },
            { q: "¿Cuál es la complejidad espacial de IDS comparada con BFS?", opts: ["IDS mucha más memoria", "IDS requiere lineal O(bd) frente al exponencial O(b^d)", "Idénticas", "IDS sin memoria"], correct: 1, just: "IDS combina la eficiencia de memoria de DFS con la completitud de BFS." },
            { q: "En suma cero, ¿cómo mejora la 'Poda Alfa-Beta' a Minimax?", opts: ["Aumenta profundidad alcanzable en el mismo tiempo", "Cambia decisión", "Múltiples oponentes", "Sin evaluación"], correct: 0, just: "Al podar ramas irrelevantes, explora mucho más profundo." }
        ],
        T10: [
            { q: "¿Cómo gestiona Bayes la 'Probabilidad a Priori'?", opts: ["La ignora", "La utiliza como punto de partida que se actualiza", "La suma al final", "Igual a 0.5"], correct: 1, just: "La creencia inicial es fundamental para ponderar la probabilidad final con evidencia." },
            { q: "En lógica difusa, ¿qué es un 'Término Lingüístico'?", opts: ["String de Python", "Conjunto difuso que representa valor vago", "Error", "Modificador"], correct: 1, just: "Etiquetas como 'tibio' que dividen el universo de discurso." },
            { q: "Los Factores de Certeza (CF) se diseñaron para evitar:", opts: ["Decimales", "Requerir cantidades inmanejables de probabilidades", "Velocidad", "Reglas SI-ENTONCES"], correct: 1, just: "Permiten asignar confianza heurística sin datos estadísticos masivos." }
        ]
    };

    let quizData = [];
    let currentIdx = 0;
    let userAnswers = [];
    let validatedArr = [];

    function shuffleOptions(qObj, temaKey) {
        let options = qObj.opts.map((text, index) => ({ text, isCorrect: index === qObj.correct }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: qObj.q,
            opts: options.map(o => o.text),
            correct: options.findIndex(o => o.isCorrect),
            just: qObj.just,
            topic: temaKey.replace('T', 'Tema ')
        };
    }
	

    function initExam() {
        quizData = [];
        Object.keys(masteryBank).forEach(tema => {
            let pool = [...masteryBank[tema]];
            for(let i=0; i<3; i++) {
                if(pool.length === 0) break;
                let rand = Math.floor(Math.random() * pool.length);
                let rawQ = pool.splice(rand, 1)[0];
                quizData.push(shuffleOptions(rawQ, tema));
            }
        });
        quizData.sort(() => Math.random() - 0.5);
        userAnswers = new Array(quizData.length).fill(null);
        validatedArr = new Array(quizData.length).fill(false);
        render();
    }

    function render() {
        const q = quizData[currentIdx];
        const isValidated = validatedArr[currentIdx];
        document.getElementById('q-meta').innerText = `DESAFÍO ${currentIdx + 1} DE 30 | ${q.topic}`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / 30) * 100}%`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        q.opts.forEach((opt, i) => {
            const div = document.createElement('div');
            const isSelected = userAnswers[currentIdx] === i;
            let statusClass = "";
            if (isValidated) {
                if (i === q.correct) statusClass = "correct-ans";
                else if (isSelected) statusClass = "wrong-ans";
                div.classList.add("disabled");
            } else if (isSelected) statusClass = "selected";

            div.className = `option-item ${statusClass}`;
            div.innerHTML = `<span>${opt}</span>`;
            if (!isValidated) div.onclick = () => selectOption(i);
            container.appendChild(div);
        });

        document.getElementById('feedback-area').style.display = isValidated ? "block" : "none";
        if (isValidated) {
            const correct = userAnswers[currentIdx] === q.correct;
            document.getElementById('feedback-status').innerText = correct ? "ANÁLISIS CORRECTO" : "ERROR DE CONCEPTO";
            document.getElementById('feedback-status').style.color = correct ? "var(--success)" : "var(--error)";
            document.getElementById('justification-text').innerText = q.just;
        }

        document.getElementById('btn-prev').disabled = currentIdx === 0;
        document.getElementById('btn-validate').style.display = isValidated ? "none" : "block";
        document.getElementById('btn-next').disabled = !isValidated;
        document.getElementById('btn-next').innerText = currentIdx === 29 ? "RESULTADOS" : "SIGUIENTE";
    }

    function selectOption(idx) {
        userAnswers[currentIdx] = idx;
        render();
    }

    function validateCurrent() {
        if (userAnswers[currentIdx] === null) return alert("Selecciona una respuesta técnica.");
        validatedArr[currentIdx] = true;
        render();
    }

    function changeQuestion(step) {
        if (step === 1 && currentIdx === 29) return showResults();
        currentIdx += step;
        render();
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        let correctCount = 0;
        const failedTopics = new Set();
        quizData.forEach((q, i) => {
            if (userAnswers[i] === q.correct) correctCount++;
            else failedTopics.add(q.topic);
        });

        const grade = (correctCount / 30) * 10;
        const finalGradeStr = grade.toFixed(2);
        const isApproved = grade >= 7.0;

        document.getElementById('final-grade').innerText = finalGradeStr;
        const statusBadge = document.getElementById('status-badge');
        statusBadge.innerText = isApproved ? "ESTADO: APROBADO" : "ESTADO: NO ACREDITADO";
        statusBadge.style.color = isApproved ? "var(--success)" : "var(--error)";

        const list = document.getElementById('failed-topics');
        list.innerHTML = "";
        failedTopics.forEach(t => { const li = document.createElement('li'); li.innerText = t; list.appendChild(li); });
        if (failedTopics.size === 0) list.innerHTML = "<li>¡Excelencia! Dominas todos los fundamentos avanzados.</li>";
        
        document.getElementById('evaluation-text').innerText = isApproved ? 
            `Has superado la evaluación deL test con un ${finalGradeStr}.` : 
            `Nota obtenida: ${finalGradeStr}. Se requiere profundizar en la teoría de los temas señalados.`;
    }

    initExam();
</script>
</body>
</html>
