<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario: Tema 06 - Técnicas de IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e293b; 
            --card-bg: #f8fafc;
            --primary: #f7b212;
            --text-main: #1e293b;
            --text-light: #64748b;
            --accent: #3b82f6;
            --success: #15803d;
            --error: #b91c1c;
            --feedback-bg: #f1f5f9;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 90%;
            max-width: 700px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            padding: 40px;
            position: relative;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            position: absolute;
            top: 0;
            left: 0;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-family: 'Arvo', serif;
            font-size: 1.6rem;
            margin: 0;
            color: var(--bg-color);
        }

        .question-number {
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .options-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-item {
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            font-size: 0.95rem;
        }

        .option-item:hover:not(.disabled) {
            border-color: var(--accent);
            background-color: #eff6ff;
        }

        .option-item.selected {
            border-color: var(--primary);
            background-color: #fefce8;
        }

        .option-item.correct-ans {
            border-color: var(--success);
            background-color: #f0fdf4;
            color: var(--success);
            font-weight: 600;
        }

        .option-item.wrong-ans {
            border-color: var(--error);
            background-color: #fef2f2;
            color: var(--error);
        }

        .option-item.disabled {
            cursor: default;
            opacity: 0.8;
        }

        input { margin-right: 12px; }

        .feedback-area {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: var(--feedback-bg);
            border-left: 4px solid var(--accent);
            display: none;
        }

        .feedback-title {
            font-weight: 700;
            display: block;
            margin-bottom: 5px;
        }

        .justification {
            font-size: 0.9rem;
            line-height: 1.4;
            color: var(--text-light);
        }

        .nav-buttons {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .btn-validate { background: var(--primary); color: #000; flex-grow: 1; }
        .btn-next { background: var(--bg-color); color: white; }
        .btn-prev { background: #e2e8f0; color: var(--text-light); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        #result-screen { text-align: center; display: none; }
        .score-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 6px solid var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin: 20px auto;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="progress-bar-container"><div id="progress-fill"></div></div>
    
    <div id="quiz-screen">
        <header>
            <span class="question-number" id="q-count"></span>
            <h1>Tema 6: Deep Learning</h1>
        </header>

        <div id="q-text" class="question-text"></div>
        <div class="options-list" id="options-container"></div>

        <div class="feedback-area" id="feedback-area">
            <span class="feedback-title" id="feedback-status"></span>
            <p class="justification" id="justification-text"></p>
        </div>

        <div class="nav-buttons">
            <button class="btn-prev" id="btn-prev" onclick="changeQuestion(-1)">Anterior</button>
            <button class="btn-validate" id="btn-validate" onclick="validateCurrent()">Validar Respuesta</button>
            <button class="btn-next" id="btn-next" onclick="changeQuestion(1)" disabled>Siguiente</button>
        </div>
    </div>

    <div id="result-screen">
        <h1>¡Test Completado!</h1>
        <div class="score-circle" id="final-score"></div>
        <p>Has finalizado el repaso de Deep Learning y Aprendizaje por Refuerzo.</p>
        <div style="text-align: left; background: #f1f5f9; padding: 20px; border-radius: 12px; margin-top: 20px;">
            <h3>Sugerencias de Repaso:</h3>
            <ul id="suggested-topics"></ul>
        </div>
        
        <button class="btn-next" style="margin-top: 20px; width: 100%;" onclick="location.reload()">Reiniciar Test</button>
        <button class="btn-prev" style="margin-top: 10px; width: 100%; border: 2px solid #e2e8f0;" onclick="window.location.href='index.html'">Ir al Menú Principal</button>
    </div>
</div>

<script>
    const quizData = [
        {
            question: "1. ¿Cuáles de las siguientes ramas pertenecen al aprendizaje automático clásico?",
            options: ["A. Aprendizaje supervisado.", "B. Aprendizaje ensemble.", "C. Deep Learning.", "D. Aprendizaje por refuerzo."],
            correct: 0,
            type: "single",
            topic: "6.2. El papel del Deep Learning",
            justification: "El aprendizaje automático clásico engloba el aprendizaje supervisado, no supervisado y semisupervisado. El aprendizaje profundo (Deep Learning) y por refuerzo se consideran ramas o paradigmas avanzados que han ganado independencia por su complejidad."
        },
        {
            question: "2. Indica todas las respuestas correctas. Los autoencoders:",
            options: [
                "A. Siempre tienen un número par de capas.",
                "B. Son redes neuronales asimétricas.",
                "C. Se pueden emplear para la compresión de imágenes.",
                "D. Son un tipo de redes convolucionales profundas."
            ],
            correct: [2],
            type: "multiple",
            topic: "6.6. Autoencoders",
            justification: "Los autocodificadores son redes simétricas con forma de reloj de arena. Se utilizan principalmente para comprimir información (etapa de codificación) y reconstruirla (decodificación), siendo la compresión de imágenes una aplicación típica."
        },
        {
            question: "3. Señala todas las respuestas correctas. Los clasificadores Naïve Bayes:",
            options: [
                "A. Son un tipo de redes de creencias.",
                "B. Son un tipo de redes Bayesianas.",
                "C. Se basan en que las características son fuertemente dependientes entre sí.",
                "D. Tienen un número impar de capas de neuronas recurrentes."
            ],
            correct: [0, 1],
            type: "multiple",
            topic: "6.3. Redes neuronales y Deep Learning",
            justification: "Los clasificadores Naïve Bayes son un caso simple de redes de creencias o bayesianas. Su nombre 'ingenuo' (Naïve) proviene de la suposición simplificadora de que todas las características son fuertemente independientes entre sí."
        },
        {
            question: "4. Señala todas las respuestas correctas. Las redes generativas antagónicas (GAN):",
            options: [
                "A. Están siempre formadas por una red convolucional y una red deconvolucional.",
                "B. Pueden estar formadas por una red convolucional y una red prealimentada.",
                "C. Están formadas por una red generativa y una red discriminativa.",
                "D. No son apropiadas para aplicaciones Deepfake al no ser redes profundas."
            ],
            correct: [1, 2],
            type: "multiple",
            topic: "6.8. Redes generativas antagónicas",
            justification: "Las GAN consisten en dos redes (generadora y discriminadora) compitiendo. Aunque es común usar CNNs, pueden combinar arquitecturas como FFNN y CNN. Son la base tecnológica detrás de los Deepfakes."
        },
        {
            question: "5. Señala todas las respuestas incorrectas. Las técnicas de aprendizaje por refuerzo:",
            options: [
                "A. Están siempre basadas en algoritmos evolutivos.",
                "B. Pueden aplicarse en el ámbito de los vehículos autónomos.",
                "C. Nunca requieren un dataset de entrenamiento, pues no necesitan modelos.",
                "D. Se pueden aplicar para crear software que comercie de forma automatizada."
            ],
            correct: [0, 2],
            type: "multiple",
            topic: "6.9. Aprendizaje por refuerzo",
            justification: "Es incorrecto decir que siempre usan algoritmos evolutivos (existen Q-Learning, A3C, etc.). También es incorrecto que nunca requieren datasets; casos como AlphaGo se entrenaron inicialmente con millones de jugadas humanas."
        },
        {
            question: "6. En un escenario de aprendizaje por refuerzo, un agente actúa con una tasa de exploración (epsilon) igual a 0.9. Señala las respuestas incorrectas:",
            options: [
                "A. En el estado actual, el agente explorará el 90% del entorno y luego finalizará.",
                "B. Existe una probabilidad del 10% de que el agente decida explorar el entorno.",
                "C. Existe una probabilidad del 90% de que el agente no decida explotar las recompensas.",
                "D. Decidirá explorar el entorno con un 90% de probabilidades solo si es su primera iteración."
            ],
            correct: [0, 1, 3],
            type: "multiple",
            topic: "6.9. Compromiso exploración-explotación",
            justification: "Una tasa de 0.9 significa que hay un 90% de probabilidad de explorar y 10% de explotar en esa iteración específica. No implica explorar el '90% del mapa' ni está restringido solo a la primera iteración."
        },
        {
            question: "7. Señala las respuestas correctas. Las memorias de largo y corto plazo (LSTM):",
            options: [
                "A. Surgieron para mejorar los perceptrones multicapa, incrementando capas ocultas.",
                "B. Tienen celdas especiales para almacenar, leer o restablecer valores mediante puertas.",
                "C. Son menos expresivas que su variación las Gated Recurrent Units (GRU).",
                "D. Son apropiadas para aplicaciones de reconocimiento de voz."
            ],
            correct: [1, 3],
            type: "multiple",
            topic: "6.5. Redes neuronales recurrentes profundas",
            justification: "Las LSTM utilizan celdas de memoria con puertas (entrada, salida y olvido) para manejar secuencias. Son ideales para audio/voz. Las GRU son variaciones más eficientes pero ligeramente menos expresivas."
        },
        {
            question: "8. Señala todas las respuestas correctas sobre TensorFlow:",
            options: [
                "A. TensorFlow es una librería de redes neuronales utilizada como alternativa a Keras.",
                "B. TensorFlow solo puede ser empleado bajo lenguaje Python.",
                "C. TensorFlow Lite permite la aplicación de redes neuronales en dispositivos móviles.",
                "D. TensorFlow es una librería específica para resolver problemas de mecánica."
            ],
            correct: [2],
            type: "multiple",
            topic: "6.11. Ejemplos de implementación",
            justification: "TensorFlow es un marco de trabajo de cálculo numérico que soporta múltiples lenguajes (C++, JS, Java) y Keras suele estar integrado en él. TensorFlow Lite es la versión específica para móviles e IoT."
        },
        {
            question: "9. Señala todas las respuestas correctas:",
            options: [
                "A. El algoritmo Q-Learning puede trabajar con datos etiquetados y no etiquetados.",
                "B. El algoritmo Q-Learning presenta sobreestimación del valor de la acción.",
                "C. El algoritmo Double Q-Learning utiliza siempre dos redes con la misma arquitectura.",
                "D. El algoritmo Double Q-Learning presenta sobreestimación en todos los escenarios."
            ],
            correct: [1, 2],
            type: "multiple",
            topic: "6.10. Aprendizaje por refuerzo profundo",
            justification: "Q-Learning sufre de sesgos positivos (sobreestimación) por el ruido en los valores estimados. Double Q-Learning se propuso para resolver esto usando dos funciones o redes (DQN y Target) con idéntica arquitectura."
        },
        {
            question: "10. Señala todas las respuestas correctas:",
            options: [
                "A. Las redes deconvolucionales pueden obtener una imagen sintética desde una etiqueta.",
                "B. Las redes DCIGN son autoencoders variacionales con dos redes deconvolucionales.",
                "C. Las redes convolucionales no son aptas para reconocimiento facial.",
                "D. La última etapa de convolución se conecta siempre a una etapa deconvolucionadora."
            ],
            correct: [0],
            type: "multiple",
            topic: "6.7. Redes neuronales convolucionales",
            justification: "Las redes deconvolucionales (DN) funcionan a la inversa de las CNN, permitiendo generar imágenes a partir de etiquetas o valores. Las CNN son, de hecho, el estándar actual para el reconocimiento facial."
        }
    ];

    let currentIdx = 0;
    const userAnswers = new Array(quizData.length).fill(null).map(() => []);
    const validatedArr = new Array(quizData.length).fill(false);

    function render() {
        const q = quizData[currentIdx];
        const isValidated = validatedArr[currentIdx];
        
        document.getElementById('q-count').innerText = `Pregunta ${currentIdx + 1} de ${quizData.length}`;
        document.getElementById('q-text').innerText = q.question;
        document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";

        q.options.forEach((opt, i) => {
            const div = document.createElement('div');
            const isSelected = userAnswers[currentIdx].includes(i);
            
            let statusClass = "";
            if (isValidated) {
                const isCorrect = Array.isArray(q.correct) ? q.correct.includes(i) : q.correct === i;
                if (isCorrect) statusClass = "correct-ans";
                else if (isSelected) statusClass = "wrong-ans";
                div.classList.add("disabled");
            } else if (isSelected) {
                statusClass = "selected";
            }

            div.className = `option-item ${statusClass}`;
            const inputType = q.type === 'multiple' ? 'checkbox' : 'radio';
            div.innerHTML = `<input type="${inputType}" ${isSelected ? 'checked' : ''} ${isValidated ? 'disabled' : ''}> <span>${opt}</span>`;
            if (!isValidated) div.onclick = () => selectOption(i);
            container.appendChild(div);
        });

        document.getElementById('feedback-area').style.display = isValidated ? "block" : "none";
        if (isValidated) {
            const isCorrect = checkCorrectness(currentIdx);
            document.getElementById('feedback-status').innerText = isCorrect ? "✓ ¡Correcto!" : "✗ Incorrecto";
            document.getElementById('feedback-status').style.color = isCorrect ? "var(--success)" : "var(--error)";
            document.getElementById('justification-text').innerText = q.justification;
        }

        document.getElementById('btn-prev').disabled = currentIdx === 0;
        document.getElementById('btn-validate').style.display = isValidated ? "none" : "block";
        document.getElementById('btn-next').disabled = !isValidated;
        document.getElementById('btn-next').innerText = currentIdx === quizData.length - 1 ? "Finalizar" : "Siguiente";
    }

    function selectOption(idx) {
        if (quizData[currentIdx].type === "single") {
            userAnswers[currentIdx] = [idx];
        } else {
            const pos = userAnswers[currentIdx].indexOf(idx);
            if (pos > -1) userAnswers[currentIdx].splice(pos, 1);
            else userAnswers[currentIdx].push(idx);
        }
        render();
    }

    function validateCurrent() {
        if (userAnswers[currentIdx].length === 0) return alert("Selecciona al menos una respuesta.");
        validatedArr[currentIdx] = true;
        render();
    }

    function checkCorrectness(idx) {
        const q = quizData[idx];
        const user = userAnswers[idx].sort().join(',');
        const correct = Array.isArray(q.correct) ? q.correct.sort().join(',') : q.correct.toString();
        return user === correct;
    }

    function changeQuestion(step) {
        if (step === 1 && currentIdx === quizData.length - 1) return showResults();
        currentIdx += step;
        render();
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        let score = 0;
        const failedTopics = new Set();
        quizData.forEach((q, i) => {
            if (checkCorrectness(i)) score++;
            else failedTopics.add(q.topic);
        });
        document.getElementById('final-score').innerText = `${score}/10`;
        const list = document.getElementById('suggested-topics');
        list.innerHTML = "";
        failedTopics.forEach(t => { const li = document.createElement('li'); li.innerText = t; list.appendChild(li); });
        if (failedTopics.size === 0) list.innerHTML = "<li>¡Increíble! Dominas los conceptos avanzados de Deep Learning.</li>";
    }

    render();
</script>
</body>
</html>
