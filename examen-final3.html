<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Nivel Maestría: Técnicas Avanzadas de IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; 
            --card-bg: #ffffff;
            --primary: #f7b212;
            --text-main: #1e293b;
            --text-light: #64748b;
            --accent: #3b82f6;
            --success: #15803d;
            --error: #b91c1c;
            --feedback-bg: #f8fafc;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 95%;
            max-width: 850px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            padding: 40px;
            position: relative;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            position: absolute;
            top: 0;
            left: 0;
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--primary));
            width: 0%;
            transition: width 0.4s ease;
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { font-family: 'Arvo', serif; font-size: 1.8rem; margin: 0; color: #0f172a; }
        .question-info { font-weight: 600; color: var(--accent); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1.5px; margin-bottom: 10px; display: block; }

        .question-text { font-size: 1.25rem; line-height: 1.6; margin-bottom: 25px; font-weight: 600; color: #1e293b; }
        .options-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 12px; }
        .option-item { border: 2px solid #f1f5f9; border-radius: 12px; padding: 16px 20px; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; font-size: 1rem; background: #fff; }
        .option-item:hover:not(.disabled) { border-color: var(--accent); background-color: #f0f9ff; transform: translateX(5px); }
        .option-item.selected { border-color: var(--primary); background-color: #fffbeb; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .option-item.correct-ans { border-color: var(--success); background-color: #f0fdf4; color: var(--success); font-weight: 600; }
        .option-item.wrong-ans { border-color: var(--error); background-color: #fef2f2; color: var(--error); }
        .option-item.disabled { cursor: default; }

        .feedback-area { margin-top: 25px; padding: 20px; border-radius: 12px; background: var(--feedback-bg); border-left: 5px solid var(--accent); display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .feedback-title { font-weight: 700; display: block; margin-bottom: 8px; font-size: 1.1rem; }
        .justification { font-size: 0.95rem; line-height: 1.5; color: var(--text-light); }

        .nav-buttons { margin-top: 35px; display: flex; justify-content: space-between; gap: 15px; }
        button { padding: 14px 28px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 0.95rem; }
        .btn-validate { background: var(--primary); color: #000; flex-grow: 1; box-shadow: 0 4px 14px 0 rgba(247, 178, 18, 0.39); }
        .btn-next { background: var(--bg-color); color: white; }
        .btn-prev { background: #f1f5f9; color: var(--text-light); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        #result-screen { text-align: center; display: none; }
        .score-circle { width: 160px; height: 160px; border-radius: 50%; border: 10px solid var(--primary); display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 30px auto; background: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .grade-val { font-size: 2.8rem; font-weight: 800; color: #0f172a; }
        .grade-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-light); letter-spacing: 1px; }
        .status-msg { font-size: 1.5rem; font-weight: 700; margin-top: 15px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="progress-fill" class="progress-bar-container"><div id="progress-fill"></div></div>
    
    <div id="quiz-screen">
        <header>
            <span class="question-info" id="q-meta"></span>
            <h1>Maestría en Inteligencia Artificial</h1>
        </header>
        <div id="q-text" class="question-text"></div>
        <div class="options-list" id="options-container"></div>
        <div class="feedback-area" id="feedback-area">
            <span class="feedback-title" id="feedback-status"></span>
            <p id="justification-text" class="justification"></p>
        </div>
        <div class="nav-buttons">
            <button class="btn-prev" id="btn-prev" onclick="changeQuestion(-1)">Anterior</button>
            <button class="btn-validate" id="btn-validate" onclick="validateCurrent()">Enviar Respuesta</button>
            <button class="btn-next" id="btn-next" onclick="changeQuestion(1)" disabled>Siguiente</button>
        </div>
    </div>

    <div id="result-screen">
        <h1>Resultado de la Evaluación</h1>
        <div class="score-circle">
            <div class="grade-val" id="final-grade">0.00</div>
            <div class="grade-label">Puntaje</div>
        </div>
        <div id="status-badge" class="status-msg"></div>
        <p id="evaluation-text" style="color: var(--text-light); margin-top: 20px;"></p>
        <div style="text-align: left; background: #f8fafc; padding: 25px; border-radius: 16px; margin-top: 30px; border: 1px solid #e2e8f0;">
            <h3 style="margin-top: 0;">Áreas de Especialización a Reforzar:</h3>
            <ul id="failed-topics" style="line-height: 1.8; color: #475569;"></ul>
        </div>
        <button class="btn-next" style="margin-top: 30px; width: 100%;" onclick="location.reload()">Generar Nueva Prueba</button>
        <button class="btn-prev" style="margin-top: 12px; width: 100%;" onclick="window.location.href='index.html'">Volver al Portal</button>
    </div>
</div>

<script>
    const masteryBank = {
        T1: [
            { q: "En el contexto de la IA Simbólica frente a la Conexionista, ¿qué ventaja fundamental ofrece el enfoque simbólico en entornos industriales regulados?", opts: ["Mayor capacidad de generalización", "Explicabilidad y trazabilidad del razonamiento (White Box)", "Eficiencia en el procesamiento de señales ruidosas", "Auto-aprendizaje sin intervención humana"], correct: 1, just: "La IA simbólica permite auditar cada paso lógico, crucial en sectores como el legal o médico." },
            { q: "Durante la fase de 'Transformación' de KDD, ¿por qué es crítico realizar un análisis de varianza antes de reducir dimensiones?", opts: ["Para eliminar el ruido aleatorio", "Para asegurar que no se pierde información discriminante esencial", "Para normalizar los datos en el rango [0,1]", "Para validar la interpretación del experto"], correct: 1, just: "La reducción de dimensiones debe preservar la varianza que explica las diferencias entre clases." },
            { q: "Desde una perspectiva ética de maestría, ¿qué riesgo introduce la 'IA Débil' en sistemas de selección automatizada?", opts: ["Conciencia de clase", "Sesgo algorítmico derivado de datos históricos", "Incansabilidad en el proceso", "Falta de potencia de cálculo"], correct: 1, just: "Al no tener 'conciencia', estos sistemas replican sesgos presentes en los datos de entrenamiento sin criterio moral." }
        ],
        T2: [
            { q: "¿Qué mecanismo de Python permite que la librería NumPy supere las limitaciones del Global Interpreter Lock (GIL)?", opts: ["El uso de decoradores @jit", "La ejecución de operaciones en extensiones de C/C++ fuera del stack de Python", "El multithreading nativo de las listas", "El uso exclusivo de variables inmutables"], correct: 1, just: "NumPy libera el GIL al ejecutar cómputos intensivos en código compilado de bajo nivel." },
            { q: "Al gestionar grandes DataFrames en Pandas, ¿qué estrategia minimiza drásticamente el uso de memoria RAM?", opts: ["Convertir todas las columnas a tipo 'object'", "Hacer copias profundas (deepcopy) constantes", "Downcasting de tipos numéricos y uso de categorías para strings", "Usar solo archivos .txt"], correct: 2, just: "Optimizar los dtypes (ej. float64 a float32) reduce el footprint de memoria significativamente." },
            { q: "En un entorno de producción de IA, ¿cuándo es preferible usar TensorFlow Lite sobre TensorFlow estándar?", opts: ["Para entrenar modelos con Petabytes de datos", "Para inferencia en dispositivos 'Edge' con latencia ultra-baja", "Para visualización de gradientes", "Para investigación teórica de nuevas funciones de activación"], correct: 1, just: "TF Lite optimiza los grafos de computación para ejecutarse en hardware limitado y local." }
        ],
        T3: [
            { q: "¿Por qué el algoritmo C4.5 prefiere la 'Proporción de Ganancia' (Gain Ratio) sobre la 'Ganancia de Información' pura?", opts: ["Es computacionalmente menos costosa", "Corrige el sesgo intrínseco hacia atributos con muchos niveles", "Garantiza que el árbol sea binario", "Aumenta la entropía de los nodos raíz"], correct: 1, just: "La ganancia pura favorece atributos con alta cardinalidad (como IDs), lo cual no generaliza bien." },
            { q: "En Random Forest, ¿cuál es el impacto técnico de aumentar el número de árboles (n_estimators) indefinidamente?", opts: ["El modelo eventualmente sufrirá de Overfitting extremo", "Se estabiliza el error pero aumenta el coste computacional linealmente", "El modelo se vuelve lineal", "Desaparece la varianza de los datos"], correct: 1, just: "A diferencia de un solo árbol, Random Forest no hace overfitting por añadir más árboles, pero sí consume más recursos." },
            { q: "La 'Pospoda' (Post-pruning) en árboles de decisión se considera superior a la 'Prepoda' porque:", opts: ["Es más rápida de ejecutar", "Evita el problema de 'visión de túnel' (ignorar ramas que parecen malas pero mejoran después)", "Requiere menos datos de validación", "Utiliza el índice Gini en lugar de Entropía"], correct: 1, just: "La pospoda evalúa el impacto real de una rama después de que se ha desarrollado el contexto completo del árbol." }
        ],
        T4: [
            { q: "En minería de reglas de asociación, ¿qué indica un valor de 'Lift' igual a 1.0 entre dos ítems {A} y {B}?", opts: ["Una correlación perfecta", "Independencia estadística absoluta entre ambos ítems", "Que el ítem A siempre causa al ítem B", "Que la regla es inválida"], correct: 1, just: "Si Lift=1, la ocurrencia de A no altera la probabilidad de ocurrencia de B; son independientes." },
            { q: "¿Cuál es la principal ventaja arquitectónica de PRISM frente a los métodos que mapean árboles de decisión a reglas?", opts: ["Genera reglas que no necesitan ser mutuamente excluyentes", "PRISM siempre genera menos reglas", "No requiere parámetros de soporte", "Solo funciona con datos binarios"], correct: 0, just: "PRISM genera reglas modulares que pueden solaparse, capturando matices que los árboles divididos pierden." },
            { q: "El algoritmo de 'Recubrimiento Secuencial' aplica una estrategia 'Greedy'. ¿Qué implicación tiene esto en la búsqueda de reglas óptimas?", opts: ["Garantiza encontrar el conjunto de reglas más corto posible", "Puede estancarse en óptimos locales al elegir el mejor par atributo-valor inmediato", "Requiere una búsqueda exhaustiva en profundidad", "No utiliza medidas de confianza"], correct: 1, just: "Al elegir el mejor paso inmediato (greedy), puede perder combinaciones de atributos más potentes a largo plazo." }
        ],
        T5: [
            { q: "¿Cuál es el propósito matemático de aplicar una función de activación no lineal (como ReLU) en las capas ocultas?", opts: ["Acelerar la multiplicación de matrices", "Permitir que la red aproxime funciones no lineales complejas", "Asegurar que los pesos sean siempre positivos", "Normalizar la salida a una probabilidad"], correct: 1, just: "Sin no-linealidad, cualquier número de capas colapsaría en una simple transformación lineal." },
            { q: "El fenómeno del 'Desvanecimiento del Gradiente' (Vanishing Gradient) afecta principalmente a redes profundas con activaciones:", opts: ["ReLU", "Sigmoides o Tangente Hiperbólica", "Identidad", "Leaky ReLU"], correct: 1, just: "Las derivadas de estas funciones son muy pequeñas en los extremos, haciendo que el error no llegue a las primeras capas." },
            { q: "En redes recurrentes de Hopfield, ¿qué representa la 'Función de Energía' del sistema?", opts: ["La velocidad de entrenamiento", "Una medida de la estabilidad de la red al recuperar una memoria", "El número de neuronas activas", "El coste de la computación distribuida"], correct: 1, just: "La red evoluciona hacia estados de mínima energía, que corresponden a los patrones almacenados (atractores)." }
        ],
        T6: [
            { q: "En una CNN, ¿cómo influye el 'Stride' (paso) mayor a 1 en el volumen de salida de la capa convolucional?", opts: ["Aumenta la resolución espacial", "Reduce el tamaño de la salida actuando como un método de submuestreo", "Aumenta el número de parámetros de la red", "No tiene efecto en las dimensiones"], correct: 1, just: "Un stride mayor 'salta' píxeles, resultando en un mapa de características más pequeño." },
            { q: "En Aprendizaje por Refuerzo, ¿qué diferencia al algoritmo 'Double Q-Learning' del 'Q-Learning' estándar?", opts: ["Usa el doble de memoria RAM", "Desacopla la selección de la acción de su evaluación para evitar el sesgo de sobreestimación", "No requiere un entorno de recompensas", "Solo funciona en espacios continuos"], correct: 1, just: "Usa dos redes para que la sobreestimación del valor de una acción no se retroalimente positivamente." },
            { q: "¿Cuál es la función del 'Discriminador' en una arquitectura GAN?", opts: ["Generar imágenes sintéticas", "Actuar como clasificador binario que distingue entre datos reales y generados", "Reducir la dimensión del ruido", "Optimizar la función de pérdida del generador"], correct: 1, just: "El discriminador obliga al generador a mejorar su calidad mediante un juego de suma cero." }
        ],
        T7: [
            { q: "Al evaluar la calidad de un clustering con K-means, ¿por qué la métrica de 'Inercia' no es suficiente por sí sola?", opts: ["Porque siempre favorece a los modelos con más clústeres (K más alto)", "Porque no mide la distancia euclídea", "Porque solo funciona con datos convexos", "Porque es muy lenta de calcular"], correct: 0, just: "La inercia baja a medida que K sube; por eso se usa el método del codo o coeficiente de silueta." },
            { q: "¿Qué ventaja ofrece el algoritmo EM (Expectation-Maximization) sobre K-means tradicional?", opts: ["Es mucho más rápido", "Permite clústeres con diferentes formas, orientaciones y solapamientos (soft clustering)", "Garantiza encontrar el óptimo global", "No requiere inicialización"], correct: 1, just: "Al usar mezclas gaussianas, EM captura la incertidumbre de pertenencia a un grupo." },
            { q: "En clustering jerárquico aglomerativo, el método de 'Enlace Completo' (Complete Linkage) tiende a producir:", opts: ["Clústeres alargados y finos", "Clústeres compactos y de diámetros similares", "Un único clúster gigante", "Solo dos clústeres"], correct: 1, just: "Al medir la distancia máxima entre puntos, evita el efecto de 'encadenamiento' del enlace simple." }
        ],
        T8: [
            { q: "¿Cómo aborda la 'Factorización de Matrices' el problema de la dispersión (sparsity) en sistemas de recomendación?", opts: ["Eliminando a los usuarios que no han votado", "Proyectando usuarios e ítems en un espacio de factores latentes de baja dimensión", "Aumentando el número de columnas de la matriz", "Usando solo filtrado demográfico"], correct: 1, just: "Captura patrones ocultos (factores latentes) que permiten predecir votos en celdas vacías." },
            { q: "En un recomendador basado en contenido, ¿cuál es el riesgo técnico de usar una representación BoW (Bag of Words) pura?", opts: ["Perder el contexto semántico y la importancia relativa de términos raros", "Aumentar demasiado la latencia", "Hacer que el sistema sea colaborativo", "Requiere demasiados usuarios"], correct: 0, just: "BoW solo cuenta frecuencias; por eso se prefiere TF-IDF para resaltar palabras clave significativas." },
            { q: "Un sistema de recomendación Híbrido de tipo 'Paralelo' combina resultados mediante:", opts: ["Pasar la salida de un modelo como entrada al siguiente", "Promediar o ponderar las puntuaciones de múltiples algoritmos independientes", "Usar solo el modelo que dé mayor confianza", "Clustering previo de usuarios"], correct: 1, just: "Ejecuta varios modelos a la vez y combina sus predicciones para mayor robustez." }
        ],
        T9: [
            { q: "En el algoritmo A*, ¿qué sucede si la función heurística h(n) es 'consistente'?", opts: ["La búsqueda se vuelve ciega", "Se garantiza que el algoritmo es óptimo sin necesidad de re-explorar nodos cerrados", "El coste g(n) se vuelve cero", "La búsqueda siempre es en amplitud"], correct: 1, just: "La consistencia es una propiedad más fuerte que la admisibilidad que optimiza la eficiencia de A*." },
            { q: "¿Cuál es la complejidad espacial de la búsqueda en Profundidad Iterativa (IDS) comparada con la búsqueda en Amplitud (BFS)?", opts: ["IDS requiere mucha más memoria", "IDS requiere O(bd) frente al O(b^d) de BFS (siendo b el factor de ramificación)", "Ambas son idénticas en memoria", "IDS no usa memoria"], correct: 1, just: "IDS combina la eficiencia de memoria de DFS con la completitud de BFS." },
            { q: "En juegos de suma cero, ¿cómo mejora la 'Poda Alfa-Beta' el rendimiento del algoritmo Minimax?", opts: ["Aumenta la profundidad máxima que se puede alcanzar en el mismo tiempo", "Cambia la decisión final para que sea más arriesgada", "Permite jugar contra múltiples oponentes", "Elimina la necesidad de una función de evaluación"], correct: 0, just: "Al podar ramas irrelevantes, se puede explorar el árbol de juego mucho más profundamente." }
        ],
        T10: [
            { q: "¿Cómo gestiona el Teorema de Bayes la 'Probabilidad a Priori' en un diagnóstico médico?", opts: ["La ignora si la evidencia es muy fuerte", "La utiliza como punto de partida que se actualiza con la verosimilitud de los síntomas", "La suma al final del proceso", "La iguala siempre a 0.5"], correct: 1, just: "La creencia inicial (prior) es fundamental para ponderar la probabilidad final tras ver la evidencia." },
            { q: "En la lógica difusa, ¿qué es un 'Término Lingüístico'?", opts: ["Una cadena de texto en Python", "Un conjunto difuso que representa un valor vago (ej. 'tibio' o 'rápido')", "Un error de sintaxis en el motor de inferencia", "Un modificador tipo 'muy'"], correct: 1, just: "Son las etiquetas que dividen el universo de discurso de una variable lingüística." },
            { q: "Los Factores de Certeza (CF) en sistemas como MYCIN se diseñaron para superar la limitación de Bayes de:", opts: ["No poder usar números decimales", "Requerir una cantidad inmanejable de probabilidades condicionales precisas", "Ser demasiado rápido", "No permitir reglas SI-ENTONCES"], correct: 1, just: "Los CF permiten a los expertos asignar confianza de forma heurística sin datos estadísticos masivos." }
        ]
    };

    let quizData = [];
    let currentIdx = 0;
    let userAnswers = [];
    let validatedArr = [];

    function shuffleOptions(qObj, temaKey) {
        let options = qObj.opts.map((text, index) => ({ text, isCorrect: index === qObj.correct }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: qObj.q,
            opts: options.map(o => o.text),
            correct: options.findIndex(o => o.isCorrect),
            just: qObj.just,
            topic: temaKey.replace('T', 'Tema ')
        };
    }

    function initExam() {
        quizData = [];
        Object.keys(masteryBank).forEach(tema => {
            let pool = [...masteryBank[tema]];
            for(let i=0; i<3; i++) {
                if(pool.length === 0) break;
                let rand = Math.floor(Math.random() * pool.length);
                let rawQ = pool.splice(rand, 1)[0];
                quizData.push(shuffleOptions(rawQ, tema));
            }
        });
        quizData.sort(() => Math.random() - 0.5);
        userAnswers = new Array(quizData.length).fill(null);
        validatedArr = new Array(quizData.length).fill(false);
        render();
    }

    function render() {
        const q = quizData[currentIdx];
        const isValidated = validatedArr[currentIdx];
        document.getElementById('q-meta').innerText = `DESAFÍO ${currentIdx + 1} DE ${quizData.length} | ${q.topic}`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        q.opts.forEach((opt, i) => {
            const div = document.createElement('div');
            const isSelected = userAnswers[currentIdx] === i;
            let statusClass = "";
            if (isValidated) {
                if (i === q.correct) statusClass = "correct-ans";
                else if (isSelected) statusClass = "wrong-ans";
                div.classList.add("disabled");
            } else if (isSelected) statusClass = "selected";

            div.className = `option-item ${statusClass}`;
            div.innerHTML = `<input type="radio" style="display:none"> <span>${opt}</span>`;
            if (!isValidated) div.onclick = () => selectOption(i);
            container.appendChild(div);
        });

        document.getElementById('feedback-area').style.display = isValidated ? "block" : "none";
        if (isValidated) {
            const correct = userAnswers[currentIdx] === q.correct;
            document.getElementById('feedback-status').innerText = correct ? "ANÁLISIS CORRECTO" : "REVISIÓN TÉCNICA REQUERIDA";
            document.getElementById('feedback-status').style.color = correct ? "var(--success)" : "var(--error)";
            document.getElementById('justification-text').innerText = q.just;
        }

        document.getElementById('btn-prev').disabled = currentIdx === 0;
        document.getElementById('btn-validate').style.display = isValidated ? "none" : "block";
        document.getElementById('btn-next').disabled = !isValidated;
        document.getElementById('btn-next').innerText = currentIdx === quizData.length - 1 ? "FINALIZAR MAESTRÍA" : "SIGUIENTE NIVEL";
    }

    function selectOption(idx) {
        userAnswers[currentIdx] = idx;
        render();
    }

    function validateCurrent() {
        if (userAnswers[currentIdx] === null) return alert("Por favor, selecciona una respuesta antes de continuar.");
        validatedArr[currentIdx] = true;
        render();
    }

    function changeQuestion(step) {
        if (step === 1 && currentIdx === quizData.length - 1) return showResults();
        currentIdx += step;
        render();
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        let correctCount = 0;
        const failedTopics = new Set();
        quizData.forEach((q, i) => {
            if (userAnswers[i] === q.correct) correctCount++;
            else failedTopics.add(q.topic);
        });

        const grade = (correctCount / quizData.length) * 10;
        const finalGradeStr = grade.toFixed(2);
        const isApproved = grade >= 6.0; // Umbral de maestría: 6.0

        document.getElementById('final-grade').innerText = finalGradeStr;
        const statusBadge = document.getElementById('status-badge');
        statusBadge.innerText = isApproved ? "ESTADO: MAESTRÍA ALCANZADA" : "ESTADO: COMPETENCIA EN DESARROLLO";
        statusBadge.style.color = isApproved ? "var(--success)" : "var(--error)";

        const list = document.getElementById('failed-topics');
        list.innerHTML = "";
        failedTopics.forEach(t => { const li = document.createElement('li'); li.innerText = t; list.appendChild(li); });
        if (failedTopics.size === 0) list.innerHTML = "<li>¡Excelencia académica! Has dominado todos los conceptos avanzados.</li>";
        
        document.getElementById('evaluation-text').innerText = isApproved ? 
            `Sobresaliente. Has demostrado una comprensión profunda de las técnicas de IA con una nota de ${finalGradeStr}.` : 
            `Has obtenido un ${finalGradeStr}. En el nivel de maestría, es fundamental profundizar en los fundamentos teóricos de los temas listados.`;
    }

    initExam();
</script>
</body>
</html>
