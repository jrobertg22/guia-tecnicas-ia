<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen de Refuerzo Conceptual V3: Técnicas de IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1e293b; 
            --card-bg: #f8fafc;
            --primary: #f7b212;
            --text-main: #1e293b;
            --text-light: #64748b;
            --accent: #3b82f6;
            --success: #15803d;
            --error: #b91c1c;
            --feedback-bg: #f1f5f9;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            width: 95%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            padding: 40px;
            position: relative;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            position: absolute;
            top: 0;
            left: 0;
        }

        #progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        header { text-align: center; margin-bottom: 25px; }
        h1 { font-family: 'Arvo', serif; font-size: 1.6rem; margin: 0; color: var(--bg-color); }
        .question-info { font-weight: 600; color: var(--accent); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 8px; display: block; }

        .question-text { font-size: 1.2rem; line-height: 1.5; margin-bottom: 20px; font-weight: 600; }
        .options-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 10px; }
        .option-item { border: 2px solid #e2e8f0; border-radius: 10px; padding: 12px 18px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; font-size: 0.95rem; }
        .option-item:hover:not(.disabled) { border-color: var(--accent); background-color: #eff6ff; }
        .option-item.selected { border-color: var(--primary); background-color: #fefce8; }
        .option-item.correct-ans { border-color: var(--success); background-color: #f0fdf4; color: var(--success); font-weight: 600; }
        .option-item.wrong-ans { border-color: var(--error); background-color: #fef2f2; color: var(--error); }
        .option-item.disabled { cursor: default; }

        .feedback-area { margin-top: 20px; padding: 15px; border-radius: 10px; background: var(--feedback-bg); border-left: 4px solid var(--accent); display: none; }
        .feedback-title { font-weight: 700; display: block; margin-bottom: 5px; }

        .nav-buttons { margin-top: 25px; display: flex; justify-content: space-between; gap: 10px; }
        button { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-validate { background: var(--primary); color: #000; flex-grow: 1; }
        .btn-next { background: var(--bg-color); color: white; }
        .btn-prev { background: #e2e8f0; color: var(--text-light); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        #result-screen { text-align: center; display: none; }
        .score-circle { width: 140px; height: 140px; border-radius: 50%; border: 8px solid var(--primary); display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 20px auto; }
        .grade-val { font-size: 2.2rem; font-weight: 800; line-height: 1; }
        .grade-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-light); margin-top: 5px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="progress-bar-container"><div id="progress-fill"></div></div>
    
    <div id="quiz-screen">
        <header>
            <span class="question-info" id="q-meta"></span>
            <h1>Refuerzo Conceptual de IA</h1>
        </header>
        <div id="q-text" class="question-text"></div>
        <div class="options-list" id="options-container"></div>
        <div class="feedback-area" id="feedback-area">
            <span class="feedback-title" id="feedback-status"></span>
            <p id="justification-text" style="font-size: 0.9rem; margin: 5px 0;"></p>
        </div>
        <div class="nav-buttons">
            <button class="btn-prev" id="btn-prev" onclick="changeQuestion(-1)">Anterior</button>
            <button class="btn-validate" id="btn-validate" onclick="validateCurrent()">Validar Respuesta</button>
            <button class="btn-next" id="btn-next" onclick="changeQuestion(1)" disabled>Siguiente</button>
        </div>
    </div>

    <div id="result-screen">
        <h1>Evaluación Finalizada</h1>
        <div class="score-circle">
            <div class="grade-val" id="final-grade">0.00</div>
            <div class="grade-label">Calificación</div>
        </div>
        <div id="status-badge" style="font-weight: 700; font-size: 1.2rem; margin-bottom: 10px;"></div>
        <p id="evaluation-text"></p>
        <div style="text-align: left; background: #f1f5f9; padding: 20px; border-radius: 12px; margin-top: 20px;">
            <h3>Recomendaciones por tema:</h3>
            <ul id="failed-topics"></ul>
        </div>
        <button class="btn-next" style="margin-top: 20px; width: 100%;" onclick="location.reload()">Nuevo Intento Aleatorio</button>
        <button class="btn-prev" style="margin-top: 10px; width: 100%; border: 2px solid #e2e8f0;" onclick="window.location.href='index.html'">Volver al Inicio</button>
    </div>
</div>

            { q: "A* es óptimo si h(n) es:", opts: ["Compleja", "Admisible (no sobreestima)", "Positiva", "Mayor que g(n)"], correct: 1, just: "Garantiza el camino de menor coste si h(n) es admisible." },
            { q: "Minimax se aplica en:", opts: ["Rutas", "Juegos de suma cero", "Médicos", "Clustering"], correct: 1, just: "Asume que el rival jugará de forma óptima contra nosotros." },
            { q: "¿Para qué sirve la Poda Alfa-Beta?", opts: ["Borrar", "Reducir nodos explorados en Minimax sin cambiar resultado", "Ganar siempre", "Más lento"], correct: 1, just: "Ignora ramas que no afectarán la decisión final." },
            { q: "Búsqueda 'Hacia Atrás' si:", opts: ["Pocos objetivos y muchos inicios", "Sin objetivos", "Mapa grande", "Un inicio"], correct: 0, just: "Es más eficiente si la meta es más clara que el inicio." },
            { q: "Coste de Estrategia de Control:", opts: ["Precio", "Tiempo dedicado a decidir qué nodo expandir", "Tiempo generar", "Suma g+h"], correct: 1, just: "Es el tiempo 'intelectual' de decisión del algoritmo." },
            { q: "Ejemplo de búsqueda real:", opts: ["Ver tele", "GPS", "Email", "Guardar"], correct: 1, just: "Los GPS usan variaciones de búsqueda heurística." }
        ],
        T10: [
            { q: "Incertidumbre se refiere a:", opts: ["Decimales", "Duda sobre veracidad de hecho/regla", "Memoria", "Mal código"], correct: 1, just: "Ocurre cuando no hay seguridad del 100%." },
            { q: "Sistema que introdujo Factores de Certeza:", opts: ["Deep Blue", "MYCIN", "AlphaGo", "ChatGPT"], correct: 1, just: "Pionero médico en gestionar la duda heurística." },
            { q: "En Lógica Difusa, la pertenencia es:", opts: ["0 o 1", "Real entre 0 y 1", "Entero", "Texto"], correct: 1, just: "Permite verdades parciales." },
            { q: "¿Qué es 'Variable Lingüística'?", opts: ["Normal", "Valores son palabras como 'frío'", "Traducción", "Secreta"], correct: 1, just: "Modela el conocimiento intuitivo humano." },
            { q: "Fuzzification es:", opts: ["Borrar", "Convertir entradas precisas en grados difusos", "Traducir", "Cero"], correct: 1, just: "Primer paso para procesar datos del mundo real." },
            { q: "Método Centroide se usa para:", opts: ["Regla larga", "Decodificación (valor preciso)", "Sumar", "Dibujar"], correct: 1, just: "Calcula el centro de gravedad de la salida." },
            { q: "Modificador (Hedge) hace:", opts: ["Borra", "Altera función de pertenencia", "Nombre", "Nada"], correct: 1, just: "Cambia matemáticamente el conjunto (ej. 'muy')." },
            { q: "Inferencia Bayesiana basa en:", opts: ["Opinión", "Probabilidades condicionadas", "Fijas", "Azar"], correct: 1, just: "Actualiza creencias con nueva evidencia." },
            { q: "Ventaja de lógica difusa industrial:", opts: ["Barata", "Sin modelo matemático exacto", "Rápida", "Perfecta"], correct: 1, just: "Controla sistemas complejos por experiencia humana." },
            { q: "CF de -1 significa:", opts: ["Verdad", "Falsedad absoluta", "Ignorancia", "Error"], correct: 1, just: "Representa incredulidad total." }
        ]
    };

    let quizData = [];
    let currentIdx = 0;
    let userAnswers = [];
    let validatedArr = [];

    function shuffleOptions(qObj, temaKey) {
        let options = qObj.opts.map((text, index) => ({ text, isCorrect: index === qObj.correct }));
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            q: qObj.q,
            opts: options.map(o => o.text),
            correct: options.findIndex(o => o.isCorrect),
            just: qObj.just,
            topic: temaKey.replace('T', 'Tema ')
        };
    }

    function initExam() {
        quizData = [];
        Object.keys(questionBank).forEach(tema => {
            let pool = [...questionBank[tema]];
            for(let i=0; i<3; i++) {
                let rand = Math.floor(Math.random() * pool.length);
                let rawQ = pool.splice(rand, 1)[0];
                quizData.push(shuffleOptions(rawQ, tema));
            }
        });
        quizData.sort(() => Math.random() - 0.5);
        userAnswers = new Array(quizData.length).fill(null);
        validatedArr = new Array(quizData.length).fill(false);
        render();
    }

    function render() {
        const q = quizData[currentIdx];
        const isValidated = validatedArr[currentIdx];
        document.getElementById('q-meta').innerText = `Pregunta ${currentIdx + 1} de 30 | ${q.topic}`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / 30) * 100}%`;
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        q.opts.forEach((opt, i) => {
            const div = document.createElement('div');
            const isSelected = userAnswers[currentIdx] === i;
            let statusClass = "";
            if (isValidated) {
                if (i === q.correct) statusClass = "correct-ans";
                else if (isSelected) statusClass = "wrong-ans";
                div.classList.add("disabled");
            } else if (isSelected) statusClass = "selected";

            div.className = `option-item ${statusClass}`;
            div.innerHTML = `<input type="radio" ${isSelected ? 'checked' : ''} ${isValidated ? 'disabled' : ''}> <span>${opt}</span>`;
            if (!isValidated) div.onclick = () => selectOption(i);
            container.appendChild(div);
        });

        document.getElementById('feedback-area').style.display = isValidated ? "block" : "none";
        if (isValidated) {
            const correct = userAnswers[currentIdx] === q.correct;
            document.getElementById('feedback-status').innerText = correct ? "✓ ¡Correcto!" : "✗ Incorrecto";
            document.getElementById('feedback-status').style.color = correct ? "var(--success)" : "var(--error)";
            document.getElementById('justification-text').innerText = q.just;
        }

        document.getElementById('btn-prev').disabled = currentIdx === 0;
        document.getElementById('btn-validate').style.display = isValidated ? "none" : "block";
        document.getElementById('btn-next').disabled = !isValidated;
        document.getElementById('btn-next').innerText = currentIdx === 29 ? "Resultados" : "Siguiente";
    }

    function selectOption(idx) {
        userAnswers[currentIdx] = idx;
        render();
    }

    function validateCurrent() {
        if (userAnswers[currentIdx] === null) return alert("Elige una opción.");
        validatedArr[currentIdx] = true;
        render();
    }

    function changeQuestion(step) {
        if (step === 1 && currentIdx === 29) return showResults();
        currentIdx += step;
        render();
    }

    function showResults() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        let correctCount = 0;
        const failedTopics = new Set();
        quizData.forEach((q, i) => {
            if (userAnswers[i] === q.correct) correctCount++;
            else failedTopics.add(q.topic);
        });

        // Cálculo de calificación 1-10 con 2 decimales
        const grade = (correctCount / 30) * 10;
        const finalGradeStr = grade.toFixed(2);
        const isApproved = grade >= 5.0; // Umbral de aprobación estándar

        document.getElementById('final-grade').innerText = finalGradeStr;
        const statusBadge = document.getElementById('status-badge');
        statusBadge.innerText = isApproved ? "ESTADO: APROBADO" : "ESTADO: NO APROBADO";
        statusBadge.style.color = isApproved ? "var(--success)" : "var(--error)";

        const list = document.getElementById('failed-topics');
        list.innerHTML = "";
        failedTopics.forEach(t => { const li = document.createElement('li'); li.innerText = t; list.appendChild(li); });
        
        if (failedTopics.size === 0) {
            list.innerHTML = "<li>¡Excelente! Dominio absoluto de todos los temas.</li>";
        }
        
        document.getElementById('evaluation-text').innerText = isApproved ? 
            `¡Felicidades! Has superado la evaluación con un ${finalGradeStr}.` : 
            `Has obtenido un ${finalGradeStr}. Es necesario repasar los temas indicados para mejorar tu desempeño.`;
    }

    initExam();
</script>
